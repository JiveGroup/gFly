services:
  db:
    image: postgres:16.4-alpine
    hostname: gfly-db
    container_name: gfly-db
    environment:
      POSTGRES_DB: gfly
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      PGDATA: /var/lib/postgresql/data/pgdata
    labels:
      SERVICE_NAME: gfly-db
      SERVICE_5432_NAME: gfly-db
      SERVICE_54320_NAME: gfly-db
    ports:
      - "${CONTAINER_DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d gfly" ]
      interval: 3s
      timeout: 3s
      retries: 10

  mail:
    image: axllent/mailpit
    hostname: gfly-mail
    container_name: gfly-mail
    labels:
      SERVICE_NAME: gfly-mail
    ports:
      - "${CONTAINER_MAIL_UI_PORT:-8025}:8025"
      - "${CONTAINER_MAIL_SMTP_PORT:-1025}:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      # No TLS
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
      # TLS
      #MP_SMTP_TLS_CERT: /data/cert.pem
      #MP_SMTP_TLS_KEY: /data/key.pem
      MP_SMTP_AUTH_FILE: /data/authfile
      TZ: Europe/London
    volumes:
      - ./mailpit:/data

  redis:
    image: redis:7.4.0-alpine
    hostname: gfly-redis
    container_name: gfly-redis
    labels:
      SERVICE_NAME: gfly-redis
    ports:
      - "${CONTAINER_REDIS_PORT:-6379}:6379"
    env_file:
      - redis/redis.env
    command: /bin/sh -c "redis-server --requirepass $$REDIS_HOST_PASSWORD"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    hostname: gfly-minio
    container_name: gfly-minio
    labels:
      SERVICE_NAME: gfly-minio
    ports:
      - "${CONTAINER_MINIO_API_PORT:-9000}:9000"
      - "${CONTAINER_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - .local/storage:/data
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: gfl1secret
    command: server --address ":9000" --console-address ":9001" /data

  mes:
    image: getmeili/meilisearch:v1.41.0
    hostname: gfly-meilisearch
    container_name: gfly-meilisearch
    labels:
      SERVICE_NAME: gfly-meilisearch
    ports:
      - "${CONTAINER_MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: "${CONTAINER_MEILI_MASTER_KEY:-secret}"
      MEILI_ENV: development
    volumes:
      - .local/meili_data:/meili_data

  es:
    image: elasticsearch:7.17.28
    container_name: gfly-es
    environment:
      node.name: es
      cluster.name: es-docker-cluster
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      bootstrap.system_call_filter: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      http.cors.enabled: "true"
      http.cors.allow-origin: "'*'"
      http.cors.allow-headers: X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization
      http.cors.allow-credentials: "true"
    ports:
      - "${CONTAINER_ES_PORT:-9200}:9200"
      - "${CONTAINER_ES_INTERNAL_PORT:-9300}:9300"
    labels:
      SERVICE_NAME: gfly-es
      SERVICE_9200_NAME: gfly-es
    volumes:
      - .local/es_data:/usr/share/elasticsearch/data
